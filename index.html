    { "category": "Backend & APIs", "items": [ {"name":"Go","level":4},{"name":"Python","level":4},{"name":"PHP / Laravel","level":4},{"name":"REST & GraphQL","level":4},{"name":"Node.js","level":3} ] },
    { "category": "Mobile, Data & Cloud", "items": [ {"name":"Flutter","level":3},{"name":"PostgreSQL","level":4},{"name":"Redis","level":4},{"name":"MongoDB","level":3},{"name":"AWS / GCP","level":3} ] },
    { "category": "DevOps & Networking", "items": [ {"name":"Docker","level":4},{"name":"Linux / Shell","level":5},{"name":"CI/CD (GitHub Actions)","level":4},{"name":"Kubernetes","level":3},{"name":"Cisco / MikroTik / Juniper","level":3} ] },
    { "category": "Design & Strategy", "items": [ {"name":"Figma / Adobe XD","level":4},{"name":"UI / UX","level":4},{"name":"Proposal & Business Strategy","level":5},{"name":"SEO","level":4} ] }
  ],
  "education": [ { "degree": "TODO — add degree & field", "institution": "University of Tabriz", "start": "", "end": "", "note": "Add degree, field of study and years." } ],
  "languages": [ {"language":"Persian (Farsi)","fluency":"Native"}, {"language":"English","fluency":"Professional working"} ],
  "theme": { "accent": "#9333ea", "accent2": "#22d3ee", "mode": "dark" }
};
/* ===== end data ===== */

const el = (t, c, h) => { const n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; };
const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m]));
const SEC = { Experience:'experience', 'Selected Projects':'projects', Skills:'skills' };

function render(cv) {
  if (cv.theme) {
    if (cv.theme.accent) document.documentElement.style.setProperty('--accent', cv.theme.accent);
    if (cv.theme.accent2) document.documentElement.style.setProperty('--accent2', cv.theme.accent2);
  }
  const b = cv.basics || {};
  document.title = (b.name || 'CV') + ' — ' + (b.title || 'CV');
  document.getElementById('eyebrow').innerHTML = (b.location ? '<span class="dot"></span> ' + esc(b.location) : 'Curriculum Vitae');
  document.getElementById('name').textContent = b.name || '';
  document.getElementById('title').textContent = b.title || '';
  document.getElementById('summary').textContent = b.summary || '';

  const c = document.getElementById('contact');
  const chip = (label, val, href) => {
    const n = el(href ? 'a' : 'span', 'chip', (label ? '<b>'+esc(label)+'</b> ' : '') + esc(val));
    if (href) { n.href = href; n.target = '_blank'; n.rel = 'noopener'; }
    return n;
  };
  if (b.email) c.appendChild(chip('', b.email, 'mailto:' + b.email));
  if (b.phone) c.appendChild(chip('', b.phone, 'tel:' + b.phone.replace(/\s/g,'')));
  if (b.location) c.appendChild(chip('', b.location));

  const main = document.getElementById('main');
  const section = (name, node) => {
    const s = el('section', 'reveal'); if (SEC[name]) s.id = SEC[name];
    const h = el('div', 'sec-head');
    h.appendChild(el('h2', null, esc(name)));
    h.appendChild(el('div', 'rule'));
    s.appendChild(h); s.appendChild(node); main.appendChild(s);
  };

  if (cv.highlights && cv.highlights.length) {
    const ul = el('ul', 'highlights card tilt');
    cv.highlights.forEach(x => ul.appendChild(el('li', null, esc(x))));
    section('Highlights', ul);
  }

  if (cv.experience && cv.experience.length) {
    const box = el('div');
    cv.experience.forEach(e => {
      const card = el('div', 'card tilt reveal');
      const row = el('div', 'row');
      row.appendChild(el('div', null, '<span class="role">'+esc(e.role)+'</span> · <span class="company">'+esc(e.company)+'</span>'));
      const d = [e.start, e.end].filter(x => x && !/^TODO/.test(x)).join(' — ') || (e.end || '');
      row.appendChild(el('div', 'dates', esc(d)));
      card.appendChild(row);
      if (e.summary) card.appendChild(el('div', 'esum', esc(e.summary)));
      if (e.bullets && e.bullets.length) {
        const ul = el('ul', 'bullets');
        e.bullets.forEach(x => ul.appendChild(el('li', null, esc(x))));
        card.appendChild(ul);
      }
      box.appendChild(card);
    });
    section('Experience', box);
  }

  if (cv.projects && cv.projects.length) {
    const grid = el('div', 'grid');
    cv.projects.forEach(p => {
      const card = el('div', 'card proj tilt reveal' + (p.highlight ? ' feat' : ''));
      const top = el('div', 'proj-top');
      top.appendChild(el('h3', null, esc(p.name)));
      if (p.highlight) top.appendChild(el('span', 'star', 'FEATURED'));
      card.appendChild(top);
      if (p.description) card.appendChild(el('p', null, esc(p.description)));
      if (p.tech && p.tech.length) {
        const t = el('div', 'tags');
        p.tech.forEach(x => t.appendChild(el('span', 'tag', esc(x))));
        card.appendChild(t);
      }
      if (p.url) { const a = el('a', 'view', 'View project →'); a.href = p.url; a.target='_blank'; a.rel='noopener'; card.appendChild(a); }
      grid.appendChild(card);
    });
    section('Selected Projects', grid);
  }

  if (cv.skills && cv.skills.length) {
    const g = el('div', 'skills-grid');
    cv.skills.forEach(cat => {
      const col = el('div', 'skill-cat card tilt');
      col.appendChild(el('h3', null, esc(cat.category)));
      (cat.items || []).forEach(it => {
        const s = el('div', 'skill');
        s.appendChild(el('div', 'lab', '<span>'+esc(it.name)+'</span>'));
        if (it.level) {
          const bar = el('div', 'bar');
          const span = el('span');
          const pct = (it.level/5*100) + '%';
          span.style.setProperty('--pct', pct);
          span.dataset.pct = pct;
          bar.appendChild(span); s.appendChild(bar);
        }
        col.appendChild(s);
      });
      g.appendChild(col);
    });
    section('Skills', g);
  }

  const eduHas = cv.education && cv.education.some(e => e.institution);
  const langHas = cv.languages && cv.languages.length;
  if (eduHas || langHas) {
    const two = el('div', 'two-col');
    const edu = el('div', 'card tilt mini');
    edu.appendChild(el('h3', 'mh', 'Education'));
    (cv.education || []).forEach(e => {
      const yrs = [e.start, e.end].filter(Boolean).join('–');
      edu.appendChild(el('div', null, '<div class="deg">'+esc(e.degree)+'</div><div class="inst">'+esc([e.institution, yrs].filter(Boolean).join(' · '))+'</div>'));
    });
    const lang = el('div', 'card tilt mini');
    lang.appendChild(el('h3', 'mh', 'Languages'));
    (cv.languages || []).forEach(l => lang.appendChild(el('div', 'lang-row', '<span>'+esc(l.language)+'</span><span>'+esc(l.fluency||'')+'</span>')));
    two.appendChild(edu); two.appendChild(lang);
    section('Background', two);
  }

  const io = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        en.target.classList.add('in');
        en.target.querySelectorAll('.bar > span').forEach(sp => sp.style.width = sp.dataset.pct || '0%');
        io.unobserve(en.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach((n, i) => { n.style.transitionDelay = Math.min(i * 45, 260) + 'ms'; io.observe(n); });

  initTilt();
}

/* ---------- 3D pointer tilt + glare ---------- */
function initTilt() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const MAX = 7;
  document.querySelectorAll('.tilt').forEach(card => {
    card.addEventListener('pointermove', e => {
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width, py = (e.clientY - r.top) / r.height;
      card.style.transform = `perspective(900px) rotateY(${(px-0.5)*MAX}deg) rotateX(${-(py-0.5)*MAX}deg) translateY(-3px)`;
      card.style.setProperty('--mx', (px*100)+'%');
      card.style.setProperty('--my', (py*100)+'%');
    });
    card.addEventListener('pointerleave', () => { card.style.transform = ''; });
  });
}

/* ---------- nav shrink + scroll progress ---------- */
(function scrollUI(){
  const nav = document.getElementById('nav'), prog = document.getElementById('prog');
  const onScroll = () => {
    const y = window.scrollY || 0;
    nav.classList.toggle('stuck', y > 20);
    const h = document.documentElement.scrollHeight - innerHeight;
    prog.style.width = (h > 0 ? (y / h) * 100 : 0) + '%';
  };
  addEventListener('scroll', onScroll, { passive: true }); onScroll();
})();

/* ---------- 3D depth constellation ---------- */
(function space() {
  const cv = document.getElementById('space');
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const ctx = cv.getContext('2d');
  let W, H, DPR, stars = [], mx = 0, my = 0, raf;
  const A = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#9333ea';
  const A2 = getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim() || '#22d3ee';
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = cv.width = innerWidth * DPR; H = cv.height = innerHeight * DPR;
    cv.style.width = innerWidth + 'px'; cv.style.height = innerHeight + 'px';
    const count = Math.min(130, Math.floor(innerWidth * innerHeight / 13000));
    stars = Array.from({ length: count }, () => ({
      x: (Math.random() - 0.5) * W, y: (Math.random() - 0.5) * H,
      z: Math.random() * W, o: 0.3 + Math.random() * 0.7, c: Math.random() > 0.5 ? A2 : A
    }));
  }
  function tick() {
    ctx.clearRect(0, 0, W, H);
    ctx.save(); ctx.translate(W / 2 + mx * 26 * DPR, H / 2 + my * 26 * DPR);
    const pts = [];
    for (const s of stars) {
      s.z -= 1.05;
      if (s.z < 1) { s.z = W; s.x = (Math.random() - 0.5) * W; s.y = (Math.random() - 0.5) * H; }
      const k = 128 / s.z, x = s.x * k, y = s.y * k, r = Math.max(0.4, (1 - s.z / W) * 2.4) * DPR;
      const a = s.o * (1 - s.z / W);
      ctx.globalAlpha = a; ctx.fillStyle = s.c;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      if (a > 0.35) pts.push([x, y, a]);
    }
    // faint connecting lines for constellation feel
    ctx.strokeStyle = A2; ctx.lineWidth = DPR * 0.5;
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i][0] - pts[j][0], dy = pts[i][1] - pts[j][1], d2 = dx*dx + dy*dy;
        if (d2 < (140 * DPR) ** 2) {
          ctx.globalAlpha = (1 - Math.sqrt(d2) / (140 * DPR)) * 0.12 * Math.min(pts[i][2], pts[j][2]);
          ctx.beginPath(); ctx.moveTo(pts[i][0], pts[i][1]); ctx.lineTo(pts[j][0], pts[j][1]); ctx.stroke();
        }
      }
    }
    ctx.restore(); ctx.globalAlpha = 1;
    raf = requestAnimationFrame(tick);
  }
  addEventListener('resize', resize, { passive: true });
  addEventListener('pointermove', e => { mx = e.clientX / innerWidth - 0.5; my = e.clientY / innerHeight - 0.5; }, { passive: true });
  document.addEventListener('visibilitychange', () => { if (document.hidden) cancelAnimationFrame(raf); else tick(); });
  resize(); tick();
})();

render(CV_DATA);
</script>
